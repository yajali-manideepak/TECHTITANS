<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Resume Builder</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>Resume Builder Pro</h1>
                <p>Create professional resumes and find talented employees</p>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="tab-btn active" data-tab="builder">Resume Builder</button>
            <button class="tab-btn" data-tab="search">Find Employees</button>
            <button class="tab-btn" data-tab="preview">Preview Resume</button>
        </nav>

        <!-- Resume Builder Tab -->
        <section id="builder" class="tab-content active">
            <div class="form-container">
                <!-- Personal Information -->
                <div class="section">
                    <h2 class="section-title">Personal Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <input type="text" id="firstName" placeholder="Mani_Deepak" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <input type="text" id="lastName" placeholder="Yajali" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" placeholder="manideepak.yajali@gmail.com" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" placeholder="+91 94942 45412" required>
                        </div>
                        <div class="form-group">
                            <label for="location">Address</label>
                            <input type="text" id="location" placeholder="City, Country">
                        </div>
                        <div class="form-group">
                            <label for="website">Website/Portfolio</label>
                            <input type="url" id="website" placeholder="https://yourportfolio.com">
                        </div>
                        <div class="form-group full">
                            <label for="summary">Professional Summary</label>
                            <textarea id="summary" placeholder="Brief overview of your professional background and goals..." rows="4"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Education Section -->
                <div class="section">
                    <h2 class="section-title">Education Qualifications</h2>
                    <div id="educationList"></div>
                    <button class="btn btn-secondary" id="addEducation">+ Add Education</button>
                </div>

                <!-- Experience Section -->
                <div class="section">
                    <h2 class="section-title">Work Experience</h2>
                    <div id="experienceList"></div>
                    <button class="btn btn-secondary" id="addExperience">+ Add Experience</button>
                </div>

                <!-- Skills Section -->
                <div class="section">
                    <h2 class="section-title">Skills</h2>
                    <div class="skills-container">
                        <div class="form-group">
                            <label for="skillInput">Add Skill</label>
                            <div class="skill-input-group">
                                <input type="text" id="skillInput" placeholder="e.g., JavaScript, React, Node.js">
                                <button class="btn btn-secondary" id="addSkill">Add</button>
                            </div>
                        </div>
                        <div id="skillsList" class="skills-list"></div>
                    </div>
                </div>

                <!-- Certifications Section -->
                <div class="section">
                    <h2 class="section-title">Certifications & Awards</h2>
                    <div id="certificationsList"></div>
                    <button class="btn btn-secondary" id="addCertification">+ Add Certification</button>
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <button class="btn btn-primary" id="saveResume">Save Resume</button>
                    <button class="btn btn-secondary" id="previewBtn">Preview</button>
                    <button class="btn btn-danger" id="clearForm">Clear All</button>
                </div>
            </div>
        </section>

        <!-- Find Employees Tab -->
        <section id="search" class="tab-content">
            <div class="search-container">
                <h2 class="section-title">Find Employees by Skills</h2>
                
                <div class="search-filters">
                    <div class="form-group">
                        <label for="skillSearch">Search by Skills (comma-separated)</label>
                        <div class="search-input-group">
                            <input type="text" id="skillSearch" placeholder="e.g., JavaScript, React, Python">
                            <button class="btn btn-primary" id="searchBtn">Search</button>
                        </div>
                    </div>
                </div>

                <div id="searchResults" class="search-results"></div>
            </div>
        </section>

        <!-- Preview Tab -->
        <section id="preview" class="tab-content">
            <div class="preview-container">
                <button class="btn btn-secondary" id="downloadResume" style="margin-bottom: 20px;">Download as PDF</button>
                <div id="resumePreview" class="resume-preview"></div>
            </div>
        </section>
    </div>

    <!-- Modal for Education/Experience/Certification -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add Education</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div id="modalContent" class="modal-content"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelModal">Cancel</button>
                <button class="btn btn-primary" id="saveModal">Save</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
